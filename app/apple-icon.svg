<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Abhinav Singh">
  <defs>
    <linearGradient id="beam" x1="30" y1="150" x2="150" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7a9e1f"/>
      <stop offset="45%" stop-color="#d4ff3a"/>
      <stop offset="100%" stop-color="#f2ff9a"/>
    </linearGradient>
    <radialGradient id="pulse" cx="96" cy="88" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4ff3a45"/>
      <stop offset="65%" stop-color="#d4ff3a12"/>
      <stop offset="100%" stop-color="#d4ff3a00"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="70%" stop-color="#0a0a0a00"/>
      <stop offset="100%" stop-color="#00000055"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="42" fill="#0a0a0a"/>
  <rect width="180" height="180" rx="42" fill="url(#pulse)"/>
  <rect width="180" height="180" rx="42" fill="url(#vignette)"/>

  <!-- Grid whisper -->
  <path d="M0 60 H180 M0 120 H180 M60 0 V180 M120 0 V180" stroke="#ffffff07" stroke-width="1"/>

  <!-- Corner frame marks -->
  <path d="M34 56 V34 H56" fill="none" stroke="#ffffff18" stroke-width="3" stroke-linecap="round"/>
  <path d="M124 34 H146 V56" fill="none" stroke="#ffffff18" stroke-width="3" stroke-linecap="round"/>
  <path d="M146 124 V146 H124" fill="none" stroke="#ffffff18" stroke-width="3" stroke-linecap="round"/>
  <path d="M56 146 H34 V124" fill="none" stroke="#ffffff18" stroke-width="3" stroke-linecap="round"/>

  <!-- Orbital rings -->
  <ellipse cx="96" cy="88" rx="48" ry="30" fill="none" stroke="#d4ff3a" stroke-width="2" opacity="0.18" transform="rotate(-24 96 88)"/>
  <ellipse cx="96" cy="88" rx="34" ry="21" fill="none" stroke="#d4ff3a" stroke-width="1.2" opacity="0.12" transform="rotate(18 96 88)"/>

  <!-- Artistic crossing beams -->
  <path d="M46 134 C66 94, 78 62, 96 46" fill="none" stroke="url(#beam)" stroke-width="12" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M68 138 C88 104, 104 72, 132 50" fill="none" stroke="url(#beam)" stroke-width="6" stroke-linecap="round" opacity="0.42"/>

  <!-- Satellite dots -->
  <circle cx="118" cy="58" r="3.5" fill="#d4ff3a" opacity="0.55"/>
  <circle cx="74" cy="112" r="2.5" fill="#d4ff3a" opacity="0.35"/>

  <!-- Core signal -->
  <circle cx="96" cy="88" r="13" fill="#d4ff3a" filter="url(#soft)"/>
  <circle cx="96" cy="88" r="5.5" fill="#0a0a0a" opacity="0.5"/>
</svg>
