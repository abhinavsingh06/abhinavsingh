<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Abhinav Singh">
  <defs>
    <linearGradient id="beam" x1="6" y1="26" x2="26" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7a9e1f"/>
      <stop offset="45%" stop-color="#d4ff3a"/>
      <stop offset="100%" stop-color="#f2ff9a"/>
    </linearGradient>
    <radialGradient id="pulse" cx="17" cy="15" r="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4ff3a40"/>
      <stop offset="70%" stop-color="#d4ff3a10"/>
      <stop offset="100%" stop-color="#d4ff3a00"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="9" fill="#0a0a0a"/>
  <rect width="32" height="32" rx="9" fill="url(#pulse)"/>

  <!-- Corner frame marks -->
  <path d="M6 10 V6 H10" fill="none" stroke="#ffffff14" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M22 6 H26 V10" fill="none" stroke="#ffffff14" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M26 22 V26 H22" fill="none" stroke="#ffffff14" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M10 26 H6 V22" fill="none" stroke="#ffffff14" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Orbital ring -->
  <ellipse cx="17" cy="15.5" rx="8.5" ry="5.5" fill="none" stroke="#d4ff3a" stroke-width="0.7" opacity="0.22" transform="rotate(-24 17 15.5)"/>

  <!-- Artistic crossing beams -->
  <path d="M8.5 23.5 C12 17, 14 11, 17 8.5" fill="none" stroke="url(#beam)" stroke-width="2.6" stroke-linecap="round" filter="url(#soft)"/>
  <path d="M12 24 C15.5 18.5, 18.5 13, 23.5 9" fill="none" stroke="url(#beam)" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>

  <!-- Core signal -->
  <circle cx="17" cy="15.5" r="2.4" fill="#d4ff3a"/>
  <circle cx="17" cy="15.5" r="1" fill="#0a0a0a" opacity="0.55"/>
</svg>
